name: Deploy Spendrix

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Backend EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.BACKEND_HOST }}
          username: ubuntu
          key: ${{ secrets.BACKEND_SSH_KEY }}
          script: |
            cd ~/Spendrix
            git pull origin main
            sudo docker compose restart backend celery celery_beat nginx

  deploy-ai:
    name: Deploy AI Service
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to AI EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.AI_HOST }}
          username: ubuntu
          key: ${{ secrets.AI_SSH_KEY }}
          script: |
            cd ~/Spendrix
            git pull origin main
            sudo docker compose restart ai_service