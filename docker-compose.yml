services:
  # --- THE GATEKEEPER (REVERSE PROXY) ---
  nginx:
    image: nginx:latest
    ports:
      - "80:80" # This is the only port open to your browser
    volumes:
      # Explicit file-to-file mapping prevents the Windows folder cache bug
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - django_static:/app/staticfiles:ro
    depends_on:
      - frontend
      - backend
      - ai_service

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=spendrix_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=2003
    ports:
      - "5432:5432" 

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - django_static:/app/staticfiles
    environment:
      - DB_HOST=db
      - DB_NAME=spendrix_db
      - DB_USER=postgres
      - DB_PASSWORD=2003
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery:
    build: ./backend
    command: celery -A core worker -l info
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=db
      - DB_NAME=spendrix_db
      - DB_USER=postgres
      - DB_PASSWORD=2003
      - DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - backend

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost/api
    depends_on:
      - backend

  ai_service:
    build: ./AI_service
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./AI_service:/app
    depends_on:
      - db

volumes:
  postgres_data:
  django_static: