services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - django_static:/app/staticfiles:ro
      - ./Backend/media:/app/media:ro
    depends_on:
      - frontend
      - backend
      - ai_service

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: spendrix_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2003

  redis:
    image: redis:7-alpine

  backend:
    build: ./Backend
    image: spendrix-backend:latest
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./Backend:/app
      - django_static:/app/staticfiles
    environment:
      DB_HOST: db
      DB_NAME: spendrix_db
      DB_USER: postgres
      DB_PASSWORD: 2003
      DB_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery:
    image: spendrix-backend:latest
    command: celery -A core worker -l info --concurrency=4
    volumes:
      - ./Backend:/app
    environment:
      DB_HOST: db
      DB_NAME: spendrix_db
      DB_USER: postgres
      DB_PASSWORD: 2003
      DB_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis
      - backend
      - ai_service

  celery_beat:
    image: spendrix-backend:latest
    command: celery -A core beat -l info --schedule=/tmp/celerybeat-schedule
    volumes:
      - ./Backend:/app
    environment:
      DB_HOST: db
      DB_NAME: spendrix_db
      DB_USER: postgres
      DB_PASSWORD: 2003
      DB_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis
      - backend
      - celery
      - ai_service

  frontend:
    build: ./Frontend
    image: spendrix-frontend:latest
    volumes:
      - ./Frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: /api
    depends_on:
      - backend

  ai_service:
    build: ./AI_service
    image: spendrix-ai-service:latest
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./AI_service:/app
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/1
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  django_static:
  frontend_node_modules: