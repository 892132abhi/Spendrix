
services:

  # =========================
  # NGINX REVERSE PROXY
  # =========================
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - django_static:/app/staticfiles:ro
      - ./backend/media:/app/media:ro
    depends_on:
      - frontend
      - backend
      - ai_service


  # =========================
  # DATABASE (POSTGRES)
  # =========================
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: spendrix_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2003


  # =========================
  # REDIS (CELERY BROKER)
  # =========================
  redis:
    image: redis:7-alpine


  # =========================
  # DJANGO BACKEND
  # =========================
  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - django_static:/app/staticfiles
    environment:
      DB_HOST: db
      DB_NAME: spendrix_db
      DB_USER: postgres
      DB_PASSWORD: 2003
      DB_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis


  # =========================
  # CELERY WORKER
  # =========================
  celery:
    build: ./backend
    command: celery -A core worker -l info --concurrency=4
    volumes:
      - ./backend:/app
    environment:
      DB_HOST: db
      DB_NAME: spendrix_db
      DB_USER: postgres
      DB_PASSWORD: 2003
      DB_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis
      - backend


  # =========================
  # CELERY BEAT (SCHEDULER)
  # =========================
  celery_beat:
    build: ./backend
    command: celery -A core beat -l info
    volumes:
      - ./backend:/app
    environment:
      DB_HOST: db
      DB_NAME: spendrix_db
      DB_USER: postgres
      DB_PASSWORD: 2003
      DB_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis
      - backend
      - celery


  # =========================
  # FRONTEND (VITE / REACT)
  # =========================
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: /api
    depends_on:
      - backend


  # =========================
  # AI SERVICE (FASTAPI)
  # =========================
  ai_service:
    build: ./AI_service
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./AI_service:/app
    environment:
      DB_HOST: db
    depends_on:
      - db


# =========================
# VOLUMES
# =========================
volumes:
  postgres_data:
  django_static: