server {
    listen 80;
    server_name localhost;

    # -------------------------
    # FRONTEND (Vite React)
    # -------------------------
    location / {
        proxy_pass http://frontend:5173;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Vite HMR)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 🎯 FIXES ERR_CONNECTION_RESET: Allocate headroom for large page chunks
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;
        
        # Keep dev sockets open
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # -------------------------
    # BACKEND (Django API)
    # -------------------------
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for your automated AI operations
        proxy_read_timeout 120s;
        proxy_connect_timeout 120s;
    }

    # -------------------------
    # DJANGO WEBSOCKETS
    # -------------------------
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------
    # DJANGO ADMIN
    # -------------------------
    location /admin/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------
    # STATIC & MEDIA FILES
    # -------------------------
    location /static/ {
        alias /app/staticfiles/;
    }
    location /media/ {
        alias /app/media/;
    }

    # -------------------------
    # AI SERVICE (FastAPI) - OPTIMIZED FOR RAG WORKSPACE
    # -------------------------
    location /ai/ {
        proxy_pass http://ai_service:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 📁 Allow large resume PDFs or image portfolios up to 15MB 
        # (Prevents 413 Request Entity Too Large errors)
        client_max_body_size 15M;

        # ⏳ Bump timeouts to 300s to let your transient FAISS matrix math 
        # and complex OpenAI structured JSON schemas finish generation safely
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
    }
}